version: '3.8'

services:
  app:
    image: node:24-alpine
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app
      # Exclude host node_modules so that linux compatible dependencies are built inside container
      - /usr/src/app/node_modules
    command: sh -c "npm install && npm run start:dev"
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://user:pass@postgres:5432/notify_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: notify_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
